name: Publish web container

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/publish-web-container.yml"
      - "opendata-linz/**"
      - "web/**"
  workflow_dispatch:

concurrency:
  group: publish-web-container-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/benjaminderprogrammierer/ars-26-hackathon-web

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Check website
        run: npm run check
        working-directory: web

      - name: Test website
        run: npm test
        working-directory: web

      - name: Build smoke-test image
        run: docker build -f web/Dockerfile -t ars-hackathon-web:smoke .

      - name: Smoke test container
        run: |
          container_id=$(docker run --detach --publish 8080:80 ars-hackathon-web:smoke)
          trap 'docker rm --force "$container_id"' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:8080/en/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs "$container_id"
          exit 1

  publish:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long,prefix=sha-

      - name: Build and publish image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: web/Dockerfile
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log in to Azure with OpenID Connect
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Redeploy Azure App Service
        run: >-
          az webapp restart
          --resource-group ArsElectronicaHackathon
          --name arselectronicahackathon-web
